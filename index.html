<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fellowship Program Tier Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3045;
    --t1: #4ade80;
    --t1bg: rgba(74,222,128,0.08);
    --t1border: rgba(74,222,128,0.25);
    --t2: #60a5fa;
    --t2bg: rgba(96,165,250,0.08);
    --t2border: rgba(96,165,250,0.25);
    --t3: #fbbf24;
    --t3bg: rgba(251,191,36,0.08);
    --t3border: rgba(251,191,36,0.25);
    --t4: #f87171;
    --t4bg: rgba(248,113,113,0.08);
    --t4border: rgba(248,113,113,0.25);
    --upgrade: #a78bfa;
    --downgrade: #fb923c;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #818cf8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    padding: 40px 32px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #13172199 0%, transparent 100%);
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: #fff;
    margin-bottom: 6px;
  }

  header p { color: var(--muted); font-size: 13px; }

  .controls {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }

  .controls-row {
    display: flex;
    gap: 8px;
    padding: 12px 32px;
    align-items: center;
    flex-wrap: wrap;
  }

  .controls-row:first-child {
    border-bottom: 1px solid var(--border);
  }

  .filter-btn {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.t1.active { background: var(--t1); border-color: var(--t1); color: #000; }
  .filter-btn.t2.active { background: var(--t2); border-color: var(--t2); color: #000; }
  .filter-btn.t3.active { background: var(--t3); border-color: var(--t3); color: #000; }
  .filter-btn.t4.active { background: var(--t4); border-color: var(--t4); color: #fff; }
  .filter-btn.changes.active { background: var(--upgrade); border-color: var(--upgrade); color: #fff; }

  .row-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; margin-right: 2px; }

  .sort-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .sort-btn:hover { border-color: var(--accent); color: var(--text); }
  .sort-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  .search-input {
    margin-left: auto;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    width: 200px;
    outline: none;
    flex-shrink: 0;
  }
  .search-input:focus { border-color: var(--accent); }

  .acgme-info {
    margin-top: 6px;
    font-size: 11.5px;
    color: #94a3b8;
    line-height: 1.5;
  }
  .acgme-info strong {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #63b3ed;
    display: block;
    margin-bottom: 2px;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .stat span { font-weight: 600; color: var(--text); }

  .main { padding: 20px 32px; }

  #loading {
    text-align: center;
    padding: 80px 32px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .program-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .program-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 12px;
    align-items: start;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .program-card:hover { border-color: #3a4060; }
  .program-card.expanded { border-color: var(--accent); }

  .rank-num {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    padding-top: 3px;
    text-align: right;
  }

  .program-info { min-width: 0; }

  .program-name {
    font-weight: 500;
    color: #e2e8f0;
    font-size: 13.5px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .program-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--muted);
  }

  .meta-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }

  .tier-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .t1 .tier-badge { background: var(--t1bg); color: var(--t1); border: 1px solid var(--t1border); }
  .t2 .tier-badge { background: var(--t2bg); color: var(--t2); border: 1px solid var(--t2border); }
  .t3 .tier-badge { background: var(--t3bg); color: var(--t3); border: 1px solid var(--t3border); }
  .t4 .tier-badge { background: var(--t4bg); color: var(--t4); border: 1px solid var(--t4border); }

  .tier-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
  }

  .change-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 8px;
  }
  .upgrade { background: rgba(167,139,250,0.15); color: var(--upgrade); }
  .downgrade { background: rgba(251,146,60,0.15); color: var(--downgrade); }
  .confirmed { background: rgba(74,222,128,0.1); color: var(--t1); }

  .ai-assessment {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    font-size: 12.5px;
    color: #cbd5e1;
    line-height: 1.65;
    grid-column: 2 / 4;
  }
  .program-card.expanded .ai-assessment { display: block; }

  .ai-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 5px;
  }

  .new-tier-rec {
    margin-top: 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .new-tier-rec.up { color: var(--upgrade); }
  .new-tier-rec.down { color: var(--downgrade); }
  .new-tier-rec.ok { color: var(--t1); }

  #apply-btn {
    margin: 20px 32px;
    padding: 10px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: none;
  }
  #apply-btn:hover { background: #6366f1; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 16px 0 8px;
  }

  .geo-tag { color: #a5f3fc !important; }
  .img-tag { color: #86efac !important; }

  .expand-panel {
    display: none;
    margin-top: 10px;
  }
  .program-card.expanded .expand-panel { display: block; }

  .tier-reasoning {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }
  .reasoning-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .reasons-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .reasons-list li {
    font-size: 12px;
    color: #cbd5e1;
    padding-left: 14px;
    position: relative;
  }
  .reasons-list li::before {
    content: '•';
    position: absolute;
    left: 0;
    color: var(--accent);
  }
  .change-suggestion {
    margin-top: 8px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 6px;
    display: inline-block;
  }
  .change-suggestion.upgrade { background: rgba(167,139,250,0.15); color: var(--upgrade); }
  .change-suggestion.downgrade { background: rgba(251,146,60,0.15); color: var(--downgrade); }
  .change-suggestion.confirmed { background: rgba(74,222,128,0.1); color: var(--t1); }

  .notes-section {
    margin-top: 10px;
  }
  .notes-label {
    font-size: 10px;
    font-weight: 600;
    color: #63b3ed;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .notes-saved {
    font-size: 9px;
    color: var(--t1);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }
  .notes-input {
    width: 100%;
    min-height: 72px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    padding: 8px 10px;
    resize: vertical;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.15s;
  }
  .notes-input:focus { border-color: #63b3ed; }
  .notes-input::placeholder { color: var(--muted); }

  .has-note {
    font-size: 11px;
    color: #63b3ed;
    margin-top: 3px;
  }

</style>
</head>

<header>
  <h1>Fellowship Program Tier Review</h1>
  <p>AI-assessed tier appropriateness based on your applicant profile · 202 programs</p>
</header>

<div class="controls">

    <span class="row-label">Filter:</span>

    <input class="search-input" type="text" placeholder="Search programs, state, city..." id="search">
  </div>
  <div class="controls-row">
    <span class="row-label">Sort:</span>
    <button class="sort-btn active" data-sort="rank">Rank <span class="sort-arrow" id="rank-arrow">↑</span></button>
    <button class="sort-btn" data-sort="name">Program <span class="sort-arrow" id="name-arrow">↑</span></button>
    <button class="sort-btn" data-sort="state">State <span class="sort-arrow" id="state-arrow">↑</span></button>
    <button class="sort-btn" data-sort="city">City <span class="sort-arrow" id="city-arrow">↑</span></button>
    <button class="sort-btn" data-sort="tier">Tier <span class="sort-arrow" id="tier-arrow">↑</span></button>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat">Loading assessment...</div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:13px;">Reviewing all 202 programs against your profile...<br>This may take 30–60 seconds.</p>
</div>

<div class="main" id="main" style="display:none">
  <div class="program-grid" id="program-grid"></div>
</div>

    if (kBase === nBase || kBase.includes(nBase) || nBase.includes(kBase)) return ACGME_DATA[k];
  }
  return null;
}

function getNotes() {
  try { return JSON.parse(localStorage.getItem(NOTES_KEY) || '{}'); } catch(e) { return {}; }
}

function saveNote(id, text) {
  const notes = getNotes();
  if (text.trim()) notes[id] = text;
  else delete notes[id];
  localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
}

let programs = [];
let currentFilter = 'all';
let currentSort = 'rank';
let sortDir = { rank: 1, name: 1, state: 1, city: 1, tier: 1 };

const LOWER_WORDS = new Set(['of','at','and','the','for','in','by','to','a','an','de','du','la','le']);
const ACRONYMS = new Set(['HCA','SUNY','UAMS','UCLA','UNLV','USF','GME','VA','MSU','NEOMED','UPMC','NYU','USC','OHSU','NY','NJ','DC']);

function toSentenceCase(str) {
  if (!str) return str;
  return str.split(' ').map((word, i) => {
    const clean = word.replace(/[^a-zA-Z0-9&'\/\-]/g, '');
    if (ACRONYMS.has(clean.toUpperCase())) return clean.toUpperCase() + word.slice(clean.length);
    if (/^[A-Z]{2,4}$/.test(clean)) return word;
    if (i > 0 && LOWER_WORDS.has(clean.toLowerCase())) return word.toLowerCase();
    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
  }).join(' ');
}

function parsePrograms() {
  return PROGRAMS_RAW.trim().split('\n').map(line => {
    const parts = line.split('|');
    return {
      id: parseInt(parts[0]),
      currentTier: parts[1],
      state: parts[2],
      city: parts[3],
      name: toSentenceCase(parts[4]),
      type: parts[5],
      pd: parts[6],
      positions: parts[7],
      imgPct: parts[8],
      score: parseInt(parts[9]),
      email: parts[10]
    };
  });
}

function tierClass(tier) {
  const t = (tier || '').match(/\d/);
  return t ? 't' + t[0] : '';
}

function tierLabel(rec) {
  return { T1: 'Tier 1 – Strong Fit', T2: 'Tier 2 – Good Fit', T3: 'Tier 3 – Moderate Fit', T4: 'Tier 4 – Reach' }[rec] || rec;
}

function tierNum(tier) {
  const m = (tier || '').match(/\d/);
  return m ? parseInt(m[0]) : 9;
}

function buildCard(p) {
  const assessment = ASSESSMENTS[p.id] || {};
  const rec = assessment.rec || '';
  const reasons = assessment.reasons || [];
  const curTierNum = 'T' + (p.currentTier.match(/\d/)?.[0] || '4');
  const tClass = tierClass(p.currentTier);

  let changeBadge = '', changeClass = '';
  if (rec && rec !== curTierNum) {
    const curN = parseInt(curTierNum[1]), recN = parseInt(rec[1]);
    if (recN < curN) { changeBadge = '\u2191 Suggest Upgrade \u2192 ' + tierLabel(rec); changeClass = 'upgrade'; }
    else { changeBadge = '\u2193 Suggest Downgrade \u2192 ' + tierLabel(rec); changeClass = 'downgrade'; }
  } else if (rec) {
    changeBadge = '\u2713 Tier confirmed'; changeClass = 'confirmed';
  }

  const geoStates = ['Virginia', 'West Virginia', 'Kentucky', 'Tennessee', 'North Carolina'];
  const isGeo = geoStates.includes(p.state);
  const acgmeVal = getAcgme(p.name.toUpperCase()) || 'No data';
  const emailLink = p.email
    ? `<a href="mailto:${p.email}" style="color:#818cf8;text-decoration:none;" onclick="event.stopPropagation()">${p.email}</a>`
    : '\u2014';

  const notes = getNotes();
  const savedNote = notes[p.id] || '';

  const reasonsHtml = reasons.map(r => `<li>${r}</li>`).join('');

  return `<div class="program-card ${tClass}" data-id="${p.id}" data-tier="${tClass}" data-has-change="${changeBadge && changeClass !== 'confirmed'}" data-name="${p.name.toLowerCase()}" data-state="${p.state.toLowerCase()}" data-city="${p.city.toLowerCase()}">
  <div class="rank-num">${p.id}</div>
  <div class="program-info">
    <div class="program-name" title="${p.name}">${p.name}</div>
    <div class="program-meta">
      <span class="meta-tag ${isGeo ? 'geo-tag' : ''}">${p.city}, ${p.state}</span>
      <span class="meta-tag img-tag">IMG: ${p.imgPct}%</span>
      <span class="meta-tag">Pos: ${p.positions}</span>
      <span class="meta-tag">Score: ${p.score}</span>
      <span class="meta-tag">${p.type || '\u2014'}</span>
    </div>
    <div class="expand-panel">
      <div class="acgme-info"><strong>Program Director</strong>${p.pd || '\u2014'}</div>
      <div class="acgme-info"><strong>Email</strong>${emailLink}</div>
      <div class="acgme-info"><strong>ACGME / Eligibility</strong>${acgmeVal}</div>
      <div class="tier-reasoning">
        <div class="reasoning-label">Why this tier (based on your profile)</div>
        <ul class="reasons-list">${reasonsHtml}</ul>
        ${changeBadge ? `<div class="change-suggestion ${changeClass}">${changeBadge}</div>` : ''}
      </div>
      <div class="notes-section">
        <div class="notes-label">My notes <span class="notes-saved" id="saved-${p.id}"></span></div>
        <textarea class="notes-input" id="note-${p.id}" placeholder="Add your notes here... (auto-saves)" onclick="event.stopPropagation()" onkeydown="event.stopPropagation()">${savedNote}</textarea>
      </div>
    </div>
  </div>
  <div class="tier-right">
    <span class="tier-badge">${p.currentTier}</span>
    ${savedNote ? '<span class="has-note">\u270F</span>' : ''}
  </div>
</div>`;
}

function updateStats() {
  const cards = document.querySelectorAll('.program-card');
  let suggestions = 0, confirmed = 0, visible = 0, withNotes = 0;
  const notes = getNotes();
  cards.forEach(c => {
    if (c.style.display !== 'none') visible++;
    if (c.dataset.hasChange === 'true') suggestions++;
    else confirmed++;
    if (notes[c.dataset.id]) withNotes++;
  });
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat">Showing <span>${visible}</span></div>
    <div class="stat">Tier suggestions <span style="color:var(--upgrade)">${suggestions}</span></div>
    <div class="stat">Confirmed <span style="color:var(--t1)">${confirmed}</span></div>
    <div class="stat">With notes <span style="color:#63b3ed">${withNotes}</span></div>`;
}

function applyFilter() {
  const query = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.program-card').forEach(card => {
    const tier = card.dataset.tier;
    const hasChange = card.dataset.hasChange === 'true';
    let show = true;
    if (currentFilter === 'changes' && !hasChange) show = false;
    if (['t1','t2','t3','t4'].includes(currentFilter) && tier !== currentFilter) show = false;
    if (query && !card.dataset.name.includes(query) && !card.dataset.state.includes(query) && !card.dataset.city.includes(query)) show = false;
    card.style.display = show ? '' : 'none';
  });
  updateStats();
}

function renderGrid() {
  const sorted = [...programs].sort((a, b) => {
    const dir = sortDir[currentSort];
    if (currentSort === 'rank')  return dir * (a.id - b.id);
    if (currentSort === 'name')  return dir * a.name.localeCompare(b.name);
    if (currentSort === 'state') return dir * a.state.localeCompare(b.state) || a.name.localeCompare(b.name);
    if (currentSort === 'city')  return dir * a.city.localeCompare(b.city) || a.name.localeCompare(b.name);
    if (currentSort === 'tier')  return dir * (tierNum(a.currentTier) - tierNum(b.currentTier)) || a.name.localeCompare(b.name);
    return 0;
  });
  const grid = document.getElementById('program-grid');
  grid.innerHTML = sorted.map(p => buildCard(p)).join('');

  // Expand/collapse on card click
  grid.addEventListener('click', e => {
    const card = e.target.closest('.program-card');
    if (!card || e.target.closest('a') || e.target.closest('textarea')) return;
    card.classList.toggle('expanded');
  });

  // Auto-save notes with debounce
  let saveTimers = {};
  grid.addEventListener('input', e => {
    const ta = e.target.closest('textarea.notes-input');
    if (!ta) return;
    const id = ta.id.replace('note-', '');
    const savedEl = document.getElementById('saved-' + id);
    if (savedEl) savedEl.textContent = 'saving...';
    clearTimeout(saveTimers[id]);
    saveTimers[id] = setTimeout(() => {
      saveNote(parseInt(id), ta.value);
      if (savedEl) { savedEl.textContent = 'saved \u2713'; setTimeout(() => { if(savedEl) savedEl.textContent = ''; }, 2000); }
      // Update has-note icon
      const card = ta.closest('.program-card');
      const tierRight = card?.querySelector('.tier-right');
      if (tierRight) {
        let noteIcon = tierRight.querySelector('.has-note');
        if (ta.value.trim() && !noteIcon) {
          noteIcon = document.createElement('span');
          noteIcon.className = 'has-note';
          noteIcon.textContent = '\u270F';
          tierRight.appendChild(noteIcon);
        } else if (!ta.value.trim() && noteIcon) {
          noteIcon.remove();
        }
      }
      updateStats();
    }, 600);
  });

  applyFilter();
}

function init() {
  programs = parsePrograms();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  renderGrid();

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      applyFilter();
    });
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.sort;
      if (currentSort === key) { sortDir[key] *= -1; }
      else { document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); currentSort = key; }
      btn.classList.add('active');
      document.querySelectorAll('.sort-btn').forEach(b => {
        const k = b.dataset.sort;
        const arrow = document.getElementById(k + '-arrow');
        if (arrow) arrow.textContent = sortDir[k] === 1 ? '\u2191' : '\u2193';
      });
      renderGrid();
    });
  });

  document.getElementById('search').addEventListener('input', applyFilter);
  updateStats();
}

init();

</script>
