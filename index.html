<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fellowship Program Tier Review</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Fellowship Program Tier Review</h1>
  <p>Tier review based on your applicant profile · Loading programs...</p>
</header>

<div class="controls">
  <div class="controls-row">
    <span class="row-label">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn t1" data-filter="t1">Tier 1</button>
    <button class="filter-btn t2" data-filter="t2">Tier 2</button>
    <button class="filter-btn t3" data-filter="t3">Tier 3</button>
    <button class="filter-btn t4" data-filter="t4">Tier 4</button>
    <button class="filter-btn shortlist" data-filter="shortlist">Shortlist (0)</button>
    <input class="search-input" type="text" placeholder="Search programs, state, city..." id="search">
  </div>
  <div class="controls-row" id="acgme-row" style="display:none"></div>
  <div class="controls-row">
    <span class="row-label">Sort:</span>
    <button class="sort-btn active" data-sort="rank">Rank <span class="sort-arrow" id="rank-arrow">↑</span></button>
    <button class="sort-btn" data-sort="name">Program <span class="sort-arrow" id="name-arrow">↑</span></button>
    <button class="sort-btn" data-sort="state">State <span class="sort-arrow" id="state-arrow">↑</span></button>
    <button class="sort-btn" data-sort="city">City <span class="sort-arrow" id="city-arrow">↑</span></button>
    <button class="sort-btn" data-sort="tier">Tier <span class="sort-arrow" id="tier-arrow">↑</span></button>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat">Loading assessment...</div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:13px;">Reviewing all programs against your profile...</p>
</div>

<div class="main" id="main" style="display:none">
  <div class="program-grid" id="program-grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
